# ═══════════════════════════════════════════════════════════════════════
# FundingPips 2-Step Challenge Configuration
# https://fundingpips.com/trading-objectives
#
# This overlay merges ON TOP of base.yaml when CONFIG_OVERLAY=fundingpips
#
# ── BREACH RULES (instant account termination) ──
#   - Daily loss > 5% of starting daily balance    → ACCOUNT CLOSED
#   - Overall drawdown > 10% below initial balance → ACCOUNT CLOSED
#   - 30 days of inactivity                        → ACCOUNT CLOSED
#
# ── PHASE TARGETS ──
#   Step 1 (Evaluation):   8% profit, min 3 trading days
#   Step 2 (Verification): 5% profit, min 3 trading days
#   Funded:                No target, 80/20 profit split
#
# ── HOW TO USE ──
#   1. Set account_size below ($5000 or $10000)
#   2. Set phase (step1, step2, or funded)
#   3. Set risk_per_trade_pct (1-3%, default 2%)
#   4. Set CONFIG_OVERLAY=fundingpips in .env
#   5. Deploy: docker compose -f docker-compose.ec2.yml up -d
#
# ── QUICK REFERENCE ($5,000 account) ──
#   Step 1 (8%):  Target $400  | daily limit $250 (bot stops at $243) | DD floor $4,500 (bot stops at $4,507)
#   Step 1 (10%): Target $500  | daily limit $250 (bot stops at $243) | DD floor $4,500 (bot stops at $4,507)
#   Step 2 (5%):  Target $250  | daily limit $250 (bot stops at $243) | DD floor $4,500 (bot stops at $4,507)
#
# ── QUICK REFERENCE ($10,000 account) ──
#   Step 1 (8%):  Target $800  | daily limit $500 (bot stops at $493) | DD floor $9,000 (bot stops at $9,007)
#   Step 1 (10%): Target $1000 | daily limit $500 (bot stops at $493) | DD floor $9,000 (bot stops at $9,007)
#   Step 2 (5%):  Target $500  | daily limit $500 (bot stops at $493) | DD floor $9,000 (bot stops at $9,007)
#
# ── QUICK REFERENCE ($100,000 account) ──
#   Step 1 (8%):  Target $8000  | daily limit $5000 (bot stops at $4993) | DD floor $90,000 (bot stops at $90,007)
#   Step 1 (10%): Target $10000 | daily limit $5000 (bot stops at $4993) | DD floor $90,000 (bot stops at $90,007)
#   Step 2 (5%):  Target $5000  | daily limit $5000 (bot stops at $4993) | DD floor $90,000 (bot stops at $90,007)
#   Master:       No target     | daily limit $5000 (bot stops at $4993) | DD floor $90,000 (bot stops at $90,007)
#                 NOTE: News trading RESTRICTED on master (5 min window). Max risk 2% (accounts $50k+).
#                 Set phase: "master" and profit_target_pct: 0 (target is ignored on master)
# ═══════════════════════════════════════════════════════════════════════

# ──────────────────────────────────────────────────────────────────────
# ACCOUNT — Change account_size to match your FundingPips account
# ──────────────────────────────────────────────────────────────────────
account:
  initial_balance: 5000            # <── CHANGE: $5000 or $10000
  mode: "live"                     # "demo" for paper trading, "live" for real
  risk_per_trade_pct: 1.0          # 1% risk — unlocks 3 profitable scalping strategies at ≥0.10 lots
  max_lot_per_trade: 0.50          # Max lot cap (prevents oversized positions)
  min_lot_size: 0.01
  balance_adjustments: []          # Clear — prop firm accounts start fresh

# ──────────────────────────────────────────────────────────────────────
# RISK — These limits have 1% BUFFER below breach thresholds
# The bot stops trading at 4% daily loss (not 5%) and 9% DD (not 10%)
# ──────────────────────────────────────────────────────────────────────
risk:
  max_open_positions: 4            # Tight: 5 strategies compete for 4 slots
  max_positions_per_symbol: 3
  max_daily_trades: 50             # Quality over quantity
  max_daily_loss_pct: 4.0          # 4% soft limit (1% BUFFER before 5% breach)
  max_drawdown_pct: 9.0            # 9% soft limit (1% BUFFER before 10% breach)

# ──────────────────────────────────────────────────────────────────────
# PROP FIRM GUARD — FundingPips-specific breach enforcement
# DO NOT change breach limits unless FundingPips changes their rules
# ──────────────────────────────────────────────────────────────────────
prop_firm:
  enabled: true                    # ← MUST be true for prop firm trading
  provider: "fundingpips"
  account_size: 5000               # <── CHANGE: Must match account.initial_balance
  phase: "step2"                   # <── CHANGE: step1 | step2 | funded
  leverage_metals: 30              # FundingPips gold leverage = 1:30
  commission_per_lot_metals: 5.0   # Typical gold round-trip commission

  # ── BREACH LIMITS (match FundingPips rules — DO NOT CHANGE) ────────
  daily_loss_limit_pct: 5.0        # HARD BREACH: >5% daily loss = account closed
  max_overall_dd_pct: 10.0         # HARD BREACH: >10% overall DD = account closed

  # ── SAFETY BUFFERS (stop trading BEFORE hitting breach) ────────────
  # Dollar buffers take precedence over pct buffers when > 0.
  # $7 means: stop exactly $7 before the hard breach limit.
  #   $5k account:  daily stops at $243 (not $250), DD floor at $4507 (not $4500)
  #   $10k account: daily stops at $493 (not $500), DD floor at $9007 (not $9000)
  safety_buffer_daily_pct: 1.0     # fallback when safety_buffer_daily_usd = 0
  safety_buffer_dd_pct: 1.0        # fallback when safety_buffer_dd_usd = 0
  safety_buffer_daily_usd: 7       # PRIMARY: stop $7 before daily hard limit
  safety_buffer_dd_usd: 7          # PRIMARY: stop $7 above DD equity floor

  # ── PROFIT TARGETS (per phase) ─────────────────────────────────────
  # Step 1 = 8% ($400 on $5k, $800 on $10k)
  # Step 2 = 5% ($250 on $5k, $500 on $10k)  ← change this when advancing
  # Funded = 0 (ignored, no target)
  profit_target_pct: 5.0           # <── Step2=5.0 ($250 on $5k)

  # ── TRADING RULES ──────────────────────────────────────────────────
  max_risk_per_trade_pct: 2.0      # Max risk any single trade can take
  friday_auto_close: true          # Close all positions before weekend gap
  friday_close_hour_utc: 21        # Friday 21:00 UTC = market close
  news_filter_enabled: true        # Skip trades during high-impact news
  max_directional_positions: 2     # Max 2 same-direction: worst case 2×1%=$100 < $250 daily limit
  min_trading_days: 3              # FundingPips requires min 3 trading days
  inactivity_limit_days: 30        # FundingPips closes after 30 days no trades

# ──────────────────────────────────────────────────────────────────────
# STRATEGIES — Backtested at 1% risk on $5k (22 runs, 11 strategies × 2 risk levels)
#
# Selected strategies (all at 1% risk — only risk level where all 3 profit):
#   MTF Momentum:      +31.7%, R:R 1:1.95, 0.10 lots, 8.8% DD, min equity $4,873
#   Keltner Squeeze:   +74.7%, R:R 1:4.00, 0.17 lots, 17.1% DD, min equity $4,644
#   Dual Supertrend:   +4329%, R:R 1:1.92, 0.14 lots, 30.2% DD, min equity $4,679
#   EMA Pullback:      Proven live $30→$376 on 4 instruments
#   London Breakout:   Proven live $30→$376 on 4 instruments
#
# All other 8 strategies lose money at both 1% and 2% risk — excluded.
# At 2% risk, only MTF survives — Keltner and DST go negative.
# ──────────────────────────────────────────────────────────────────────
strategies:
  scalping:
    risk_per_trade_pct: 1.0        # Must match account.risk_per_trade_pct (backtest engine only)
    profit_growth_factor: 0.50     # Compound 50% of profits into risk sizing
    max_total_open_positions: 4
    daily_loss_limit_pct: 4.0      # Must match risk.max_daily_loss_pct
    instruments: [XAUUSD, USDJPY, GBPJPY]
    strategies_enabled:
      - m5_mtf_momentum            # XAUUSD + USDJPY + GBPJPY
      - m5_keltner_squeeze         # XAUUSD only
      - m5_dual_supertrend         # XAUUSD only
      - m5_amd_cycle               # XAUUSD + USDJPY + GBPJPY
      - m5_stochrsi_adx            # GBPJPY only
    # ── Per-instrument optimal risk (from 4-risk backtest matrix) ──
    instrument_strategy_overrides:
      XAUUSD:
        m5_mtf_momentum: { risk_pct: 1.0 }
        m5_keltner_squeeze: { risk_pct: 1.0 }
        m5_dual_supertrend: { risk_pct: 1.0 }
        london_breakout: { risk_pct: 1.0 }
        m5_amd_cycle: { risk_pct: 1.0 }
      USDJPY:
        m5_mtf_momentum: { risk_pct: 2.0 }
        m5_amd_cycle: { risk_pct: 0.25 }
        ema_pullback: { risk_pct: 2.0 }
        london_breakout: { risk_pct: 0.25 }
      GBPJPY:
        m5_mtf_momentum: { risk_pct: 1.0 }
        m5_amd_cycle: { risk_pct: 2.0 }
        m5_stochrsi_adx: { risk_pct: 2.0 }
        ema_pullback: { risk_pct: 2.0 }
  # ── Main strategies: pinned from base.yaml (immune to drift) ────────
  ema_pullback:
    enabled: true
    fast_ema: 8
    slow_ema: 21
    trend_ema: 50
    pullback_max_candles: 5
    entry_window_candles: 2
    atr_sl_multiplier: 3.5         # Wide SL — proven in $30→$376 live run
    atr_tp_multiplier: 10.0        # Trailing stop is the real exit
    entry_timeframe: "M15"
    regime_timeframe: "H1"
  london_breakout:
    enabled: true
    asian_start_hour: 0
    asian_end_hour: 7
    breakout_buffer_pips: 3.0
    max_trades_per_day: 2
    tp_multiplier: 5.0             # Let trailing stop be the real exit
    timeframe: "M15"

# ──────────────────────────────────────────────────────────────────────
# CLAUDE AI FILTER — Pre-trade signal evaluation
# Calls Claude Haiku (~$0.0001/trade) to score each signal before entry
# Fails open: if API is unavailable, trades proceed normally
# ──────────────────────────────────────────────────────────────────────
claude_filter:
  enabled: false                   # Disabled — strategies use own confidence scores. Re-enable when API key works.
  model: "claude-haiku-4-5-20251001"
  confidence_threshold: 0.65       # Skip signals Claude scores below 65%
  timeout_seconds: 5.0             # API timeout — fails open on timeout

# ──────────────────────────────────────────────────────────────────────
# SIGNAL GENERATOR — Run only gold, only during active sessions
# ──────────────────────────────────────────────────────────────────────
signal_generator:
  instruments: [XAUUSD, XAGUSD, BTCUSD, ETHUSD, USDJPY, GBPJPY]  # All profitable instruments
  instrument_overrides: {}         # Nullify base.yaml ETHUSD 3% override — all instruments use account.risk_per_trade_pct
  allowed_sessions:
    - asian
    - london
    - new_york
    - london_ny_overlap
    - asian_london_overlap
