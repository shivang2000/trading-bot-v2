#
# Server: VantageInternational-Demo
# Login: 24503407
#
# Strategy Selection (all DD < 10% on backtests):
#   XAUUSD:
#     - Keltner Squeeze:    +76% at 0.25%, 6.9% DD
#     - Tight SL Scalp:     +40% at 0.25%, 5.1% DD
#     - Liquidity Sweep:    +5.4% at 0.5%, 4.9% DD
#   US30 (DJ30.r on Vantage):
#     - AMD Cycle:           +24.8% at 1.0%, 2.7% DD — CHAMPION
#     - NY ORB:              +14.4% at 0.5%, 6.7% DD
#     - Tight SL Scalp:     +8.8% at 0.25%, 9.8% DD
#   Both: EMA Pullback + London Breakout at 1.0%
#
# DISABLED (backtest failures):
#   - m5_ema_833: loses money everywhere
#   - m5_dual_supertrend: DD 33-54%, instant breach
#   - m30_fvg_ema: 0% WR on gold
#   - m5_180_reversal: DD 15-25%, too risky for prop
