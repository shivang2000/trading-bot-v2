mt5:
  rpyc_host: "${MT5_HOST:localhost}"
  rpyc_port: "${MT5_PORT:8001}"
  connection_timeout: 30

account:
  initial_balance: 30
  risk_per_trade_pct: 2.0       # was 1.0 — 2x more risk per trade
  max_lot_per_trade: 0.50       # was 0.10 — allow bigger lots as account grows
  min_lot_size: 0.01

instruments:
  - symbol: XAUUSD
    point_size: 0.01
    tick_value: 0.01
    min_lot: 0.01
    max_lot: 100.0
    lot_step: 0.01
  - symbol: XAGUSD
    point_size: 0.001
    tick_value: 0.05
    min_lot: 0.01
    max_lot: 100.0
    lot_step: 0.01
  - symbol: BTCUSD
    point_size: 1.0
    tick_value: 1.0
    min_lot: 0.01
    max_lot: 10.0
    lot_step: 0.01
  - symbol: ETHUSD
    point_size: 0.01
    tick_value: 0.01
    min_lot: 0.01
    max_lot: 100.0
    lot_step: 0.01

risk:
  max_open_positions: 5         # was 3
  max_positions_per_symbol: 2   # was 1 — allow pyramiding
  max_daily_trades: 20          # was 10
  max_daily_loss_pct: 8.0       # was 5.0
  max_drawdown_pct: 20.0        # was 15.0

signal_parser:
  model: "claude-haiku-4-5-20251001"
  timeout_ms: 5000
  min_confidence: 0.45          # was 0.5 — slightly more permissive
  stale_price_threshold_pct: 1.0
  atr_sl_multiplier: 3.0        # was 2.0 — wider SL for Telegram signals too
  atr_tp_multiplier: 2.0        # was 3.0 — tighter TP
  amendment_window_minutes: 5

trailing_stop:
  enabled: true
  atr_multiplier: 1.5           # tighter trailing = lock in profits faster
  activation_pct: 0.2           # activate at just 20% of TP distance
  atr_period: 14
  atr_timeframe: "H1"

signal_generator:
  enabled: true
  scan_interval_seconds: 60     # was 300 — scan every 1 min
  instruments: [XAUUSD, XAGUSD, BTCUSD, ETHUSD]
  allowed_sessions: [london, new_york, london_ny_overlap, asian_london_overlap]

strategies:
  ema_pullback:
    enabled: true
    fast_ema: 8
    slow_ema: 21
    trend_ema: 50
    pullback_max_candles: 5
    entry_window_candles: 2
    atr_sl_multiplier: 2.5      # moderate SL
    atr_tp_multiplier: 10.0     # huge TP — let trailing stop be the real exit
    entry_timeframe: "M15"
    regime_timeframe: "H1"
  london_breakout:
    enabled: true
    asian_start_hour: 0
    asian_end_hour: 7
    breakout_buffer_pips: 3.0
    max_trades_per_day: 2
    tp_multiplier: 5.0          # huge TP — let trailing stop be the real exit
    timeframe: "M15"
  smc_confluence:
    enabled: false
    ob_confidence_boost: 0.10
    fvg_confidence_boost: 0.10
    bos_confidence_boost: 0.05
    liquidity_sweep_boost: 0.10
    opposing_ob_penalty: 0.15
    lookback_bars: 100

position_monitor:
  poll_interval_seconds: 30

monitoring:
  log_level: INFO
  log_file: logs/trading.log
  telegram:
    enabled: false
    bot_token: "${TELEGRAM_BOT_TOKEN:}"
    chat_id: "${TELEGRAM_CHAT_ID:}"
  slack:
    enabled: true
    webhook_url: "${SLACK_WEBHOOK_URL:}"

telegram_listener:
  api_id: "${TELEGRAM_API_ID:}"
  api_hash: "${TELEGRAM_API_HASH:}"
  phone: "${TELEGRAM_PHONE:}"
  session_path: "data/telegram_session"

database:
  path: "data/trading_bot_v2.db"
