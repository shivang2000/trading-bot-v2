# ═══════════════════════════════════════════════════════════════════════
# FundingPips $100,000 Account — Optimal Configuration
# Generated from backtesting matrix: 3 strategies × 4 risk levels
#
# OPTIMAL RISK: 1% per trade (best risk-adjusted returns)
#   - MTF Momentum:    ✓ profitable (+31.4%, R:R 1:1.94, $1,673/mo at 80% split)
#   - Keltner Squeeze: ✓ profitable (+76.2%, R:R 1:4.02, $4,066/mo at 80% split)
#   - Dual Supertrend: ✓ profitable (+4190%, compounding, $1,127-4,066/mo realistic)
#   - EMA Pullback:    ✓ proven live ($30→$376)
#   - London Breakout: ✓ proven live ($30→$376)
#
# At 2% risk: Only MTF survives ($3,031/mo). Keltner and DST lose money.
# At 0.5%: Keltner ($2,915/mo) + DST ($2,844/mo) good but MTF loses.
# At 0.25%: Keltner ($1,782/mo) + DST ($1,127/mo) safe, MTF loses.
# ★ 1% is optimal — all 3 scalping strategies profitable, highest total.
#
# FundingPips rule: accounts >$50k max 2% risk/trade (1% is within limits)
#
# PROJECTED MONTHLY INCOME (funded, 80% split): ~$5,739/month ($68,858/year)
# ═══════════════════════════════════════════════════════════════════════

account:
  initial_balance: 100000
  mode: "live"
  risk_per_trade_pct: 1.0          # ★ OPTIMAL for $100k (FundingPips max 2%)
  max_lot_per_trade: 5.00
  min_lot_size: 0.01
  balance_adjustments: []

risk:
  max_open_positions: 4
  max_positions_per_symbol: 3
  max_daily_trades: 50
  max_daily_loss_pct: 4.0
  max_drawdown_pct: 9.0

prop_firm:
  enabled: true
  provider: "fundingpips"
  account_size: 100000
  phase: "step1"                   # Change: step1 → step2 → funded
  leverage_metals: 30
  commission_per_lot_metals: 5.0
  daily_loss_limit_pct: 5.0
  max_overall_dd_pct: 10.0
  safety_buffer_daily_pct: 1.0
  safety_buffer_dd_pct: 1.0
  safety_buffer_daily_usd: 7
  safety_buffer_dd_usd: 7
  profit_target_pct: 10.0         # Step1=10.0, Step2=5.0, Funded=0
  max_risk_per_trade_pct: 2.0     # FundingPips: >$50k = 2% max
  friday_auto_close: true
  friday_close_hour_utc: 21
  news_filter_enabled: true
  max_directional_positions: 2
  min_trading_days: 3
  inactivity_limit_days: 30

strategies:
  scalping:
    risk_per_trade_pct: 1.0
    profit_growth_factor: 0.50
    max_total_open_positions: 4
    daily_loss_limit_pct: 4.0
    instruments: [XAUUSD]
    strategies_enabled:
      - m5_mtf_momentum            # ✓ +31.4%, R:R 1:1.94, $1,673/mo
      - m5_keltner_squeeze         # ✓ +76.2%, R:R 1:4.02, $4,066/mo
      - m5_dual_supertrend         # ✓ profitable at 1% (compounding effect)
  ema_pullback:
    enabled: true
    fast_ema: 8
    slow_ema: 21
    trend_ema: 50
    pullback_max_candles: 5
    entry_window_candles: 2
    atr_sl_multiplier: 3.5
    atr_tp_multiplier: 10.0
    entry_timeframe: "M15"
    regime_timeframe: "H1"
  london_breakout:
    enabled: true
    asian_start_hour: 0
    asian_end_hour: 7
    breakout_buffer_pips: 3.0
    max_trades_per_day: 2
    tp_multiplier: 5.0
    timeframe: "M15"

claude_filter:
  enabled: false

signal_generator:
  instruments: [XAUUSD, XAGUSD, BTCUSD, ETHUSD]
  instrument_overrides: {}
  allowed_sessions:
    - london
    - new_york
    - london_ny_overlap
    - asian_london_overlap
