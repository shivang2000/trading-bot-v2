# ─────────────────────────────────────────────────────────
# Trading Bot V2 — Local Development (macOS ARM64)
#
# MT5 cannot run on Apple Silicon Macs. Two options:
#
#   Option A: Bot locally, MT5 on EC2
#     1. Deploy MT5 on EC2 using docker-compose.ec2.yml
#     2. Set MT5_HOST in .env to your EC2 IP/hostname
#     3. docker compose up -d
#
#   Option B: Full stack on EC2
#     Use docker-compose.ec2.yml on your EC2 instance
#
# Usage:
#   docker compose up -d
#   docker compose logs -f trading-bot
#   docker compose down
# ─────────────────────────────────────────────────────────

services:
  trading-bot:
    build: .
    container_name: trading-bot-v2
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 512M
